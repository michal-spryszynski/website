    <script>
        const SHOW_PROJECTS = false;
        const SHOW_DISCORD  = false;

        function getLang() {
            const param = new URLSearchParams(window.location.search).get('lang');
            return (param === 'en' || param === 'pl') ? param : 'pl';
        }

        function setLang(lang) {
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.replaceState({}, '', url);
            applyLang(lang);
        }

        function applyLang(lang) {
            const dict = T[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (dict[key] !== undefined) el.textContent = dict[key];
            });
            document.querySelectorAll('.project-card').forEach(card => {
                card.querySelector('.card-title').textContent = card.dataset[`title${lang.charAt(0).toUpperCase() + lang.slice(1)}`];
                card.querySelector('.card-short').textContent = card.dataset[`short${lang.charAt(0).toUpperCase() + lang.slice(1)}`];
            });
            document.getElementById('lang-toggle').innerHTML = lang === 'pl' ? '<em>PL</em> / EN' : 'PL / <em>EN</em>';
            document.documentElement.lang = lang;
        }

        const backdrop = document.getElementById('project-backdrop');
        const overlay  = document.getElementById('project-overlay');
        const oTitle   = document.getElementById('overlay-title');
        const oDesc    = document.getElementById('overlay-desc');
        const oBtn     = document.getElementById('overlay-btn');
        const oClose   = document.getElementById('overlay-close');

        function openProject(card) {
            const lang = getLang();
            const cap  = lang.charAt(0).toUpperCase() + lang.slice(1);
            oTitle.textContent = card.dataset[`title${cap}`];
            oDesc.textContent  = card.dataset[`desc${cap}`];
            oBtn.href          = card.dataset.url;
            overlay._card      = card;
            backdrop.classList.add('visible');
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
            oClose.focus();
        }

        function closeProject() {
            backdrop.classList.remove('visible');
            overlay.classList.remove('visible');
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', () => openProject(card));
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'button');
        });

        backdrop.addEventListener('click', closeProject);
        oClose.addEventListener('click', closeProject);
        document.getElementById('lang-toggle').addEventListener('click', () => setLang(getLang() === 'pl' ? 'en' : 'pl'));

        document.getElementById('discord-btn').addEventListener('click', () => {
            navigator.clipboard.writeText('sprysiu').then(() => {
                const label = document.getElementById('discord-label');
                label.textContent = 'Copied!';
                setTimeout(() => label.textContent = '@sprysiu', 2000);
            });
        });

        if (!SHOW_DISCORD)  document.getElementById('discord-btn').style.display = 'none';
        if (!SHOW_PROJECTS) document.getElementById('projects').style.display = 'none';

        applyLang(getLang());
    </script>

    <script>
    (function () {
        const canvas = document.getElementById('gol-canvas');
        const ctx    = canvas.getContext('2d');
        const CELL   = 8;
        const FPS    = 8;  // Slightly faster for smoother flow
        let cols, rows, grid;

        function init() {
            canvas.width  = window.innerWidth;
            canvas.height = document.documentElement.scrollHeight;
            cols = Math.ceil(canvas.width  / CELL);
            rows = Math.ceil(canvas.height / CELL);
            grid = new Uint8Array(cols * rows);
            for (let i = 0; i < grid.length; i++) grid[i] = Math.random() < 0.15 ? 1 : 0;
        }

        // Mouse interaction
        window.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = (e.clientY + window.scrollY) - rect.top;
            const c = Math.floor(x / CELL);
            const r = Math.floor(y / CELL);
            
            if (c >= 0 && c < cols && r >= 0 && r < rows) {
                // Add a small cluster on click
                for (let i = -2; i <= 2; i++) {
                    for (let j = -2; j <= 2; j++) {
                        const nc = c + i;
                        const nr = r + j;
                        if (nc >= 0 && nc < cols && nr >= 0 && nr < rows && Math.random() > 0.3) {
                            grid[nr * cols + nc] = 1;
                        }
                    }
                }
            }
        });

        function step() {
            const next = new Uint8Array(cols * rows);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let n = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            n += grid[((r + dr + rows) % rows) * cols + ((c + dc + cols) % cols)];
                        }
                    }
                    const alive = grid[r * cols + c];
                    next[r * cols + c] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
                }
            }
            grid = next;
        }

        function draw() {
            // Motion trail: don't clear fully, draw a semi-transparent rectangle over the previous frame
            ctx.fillStyle = 'rgba(3, 7, 18, 0.3)'; // Match background color with alpha
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'rgba(139, 92, 246, 0.15)'; // Soft, low-contrast purple
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r * cols + c]) {
                        ctx.fillRect(c * CELL, r * CELL, CELL - 1, CELL - 1);
                    }
                }
            }
        }

        let lastTime = 0;
        function loop(ts) {
            requestAnimationFrame(loop);
            if (ts - lastTime < 1000 / FPS) return;
            lastTime = ts;
            step();
            draw();
        }
        let _lastWidth = window.innerWidth;
        window.addEventListener('resize', () => {
            if (window.innerWidth !== _lastWidth) {
                _lastWidth = window.innerWidth;
                init(); draw();
            }
        });

        init();
        requestAnimationFrame(loop);
    })();
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    async function init() {
        const container = document.getElementById('three-container');
        const loading   = document.getElementById('three-loading');
        const loadingBar = document.getElementById('loading-bar');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(1, 1, 2);
        camera.add(light);
        scene.add(camera);

        const material = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.3, metalness: 0.2 });
        
        // Debug Cube (Remove once pet is working)
        // const debugCube = new THREE.Mesh(new THREE.BoxGeometry(20, 20, 20), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        // scene.add(debugCube);

        const loader = new OBJLoader();
        let petPivot;

        try {
            const model = await new Promise((res, rej) => {
                loader.load('models/esp32_v2.obj', res, xhr => {
                    if (xhr.lengthComputable) loadingBar.style.width = (xhr.loaded / xhr.total * 100) + '%';
                }, rej);
            });

            model.traverse(c => { if (c.isMesh) c.material = material; });
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);

            petPivot = new THREE.Group();
            petPivot.add(model);
            scene.add(petPivot);

            const size = box.getSize(new THREE.Vector3());
            const scale = 60 / Math.max(size.x, size.y, size.z); // Slightly larger
            petPivot.scale.set(scale, scale, scale);

            loading.style.opacity = '0';
            setTimeout(() => loading.style.display = 'none', 500);
        } catch (e) { 
            console.error('Pet Load Error:', e);
            document.getElementById('loading-text').textContent = 'Error loading pet.';
        }

        let smoothScrollPercent = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            const vFOV = camera.fov * Math.PI / 180;
            const h = 2 * Math.tan(vFOV / 2) * camera.position.z;
            const w = h * camera.aspect;

            if (petPivot) {
                petPivot.rotation.y += 0.01;
                petPivot.rotation.x += 0.005;

                const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight || 1);
                
                // Lerp for smooth movement (0.1 is the easing factor, lower = smoother/slower)
                smoothScrollPercent += (scrollPercent - smoothScrollPercent) * 0.1;

                // Position: Right side, moving vertically with easing
                petPivot.position.x = (w / 2) - 60; 
                petPivot.position.y = (h / 2) - 100 - (smoothScrollPercent * (h - 200));
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }
    init();
    </script>
