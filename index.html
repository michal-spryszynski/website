    <script src="translations.js"></script>
    <script>
        // ── Language helpers ────────────────────────────────────────────────
        function getLang() {
            const param = new URLSearchParams(window.location.search).get('lang');
            return (param === 'en' || param === 'pl') ? param : 'pl';
        }

        function setLang(lang) {
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.history.replaceState({}, '', url);
            applyLang(lang);
        }

        function applyLang(lang) {
            const dict = T[lang];

            // Static data-i18n elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (dict[key] !== undefined) el.textContent = dict[key];
            });

            // Project cards — title & short description
            document.querySelectorAll('.project-card').forEach(card => {
                card.querySelector('.card-title').textContent = card.dataset[`title${lang.charAt(0).toUpperCase() + lang.slice(1)}`];
                card.querySelector('.card-short').textContent = card.dataset[`short${lang.charAt(0).toUpperCase() + lang.slice(1)}`];
            });

            // Toggle — highlight active language
            document.getElementById('lang-toggle').innerHTML =
                lang === 'pl' ? '<em>PL</em> / EN' : 'PL / <em>EN</em>';

            // html[lang] attribute
            document.documentElement.lang = lang;

            // Keep overlay in sync if it's open
            const overlay = document.getElementById('project-overlay');
            if (overlay.classList.contains('visible') && overlay._card) {
                document.getElementById('overlay-desc').textContent =
                    overlay._card.dataset[`desc${lang.charAt(0).toUpperCase() + lang.slice(1)}`];
            }
        }

        // ── Overlay ─────────────────────────────────────────────────────────
        const backdrop = document.getElementById('project-backdrop');
        const overlay  = document.getElementById('project-overlay');
        const oTitle   = document.getElementById('overlay-title');
        const oDesc    = document.getElementById('overlay-desc');
        const oBtn     = document.getElementById('overlay-btn');
        const oClose   = document.getElementById('overlay-close');

        function openProject(card) {
            const lang = getLang();
            const cap  = lang.charAt(0).toUpperCase() + lang.slice(1);
            oTitle.textContent = card.dataset[`title${cap}`];
            oDesc.textContent  = card.dataset[`desc${cap}`];
            oBtn.href          = card.dataset.url;
            overlay._card      = card;

            backdrop.classList.add('visible');
            overlay.classList.add('visible');
            document.body.style.overflow = 'hidden';
            oClose.focus();
        }

        function closeProject() {
            backdrop.classList.remove('visible');
            overlay.classList.remove('visible');
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', () => openProject(card));
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openProject(card); }
            });
            card.setAttribute('tabindex', '0');
            card.setAttribute('role', 'button');
        });

        backdrop.addEventListener('click', closeProject);
        oClose.addEventListener('click', closeProject);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProject(); });

        // ── Toggle ───────────────────────────────────────────────────────────
        const toggle = document.getElementById('lang-toggle');
        toggle.addEventListener('click', () => setLang(getLang() === 'pl' ? 'en' : 'pl'));
        toggle.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle.click(); }
        });

        // ── Init ─────────────────────────────────────────────────────────────
        applyLang(getLang());
    </script>

    <script>
    // ── Game of Life background ───────────────────────────────────────────────
    (function () {
        const canvas = document.getElementById('gol-canvas');
        const ctx    = canvas.getContext('2d');
        const CELL   = 8;   // pixel size of each cell
        const FPS    = 10;  // simulation speed
        let cols, rows, grid;

        function init() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.ceil(canvas.width  / CELL);
            rows = Math.ceil(canvas.height / CELL);
            grid = new Uint8Array(cols * rows);
            for (let i = 0; i < grid.length; i++) {
                grid[i] = Math.random() < 0.18 ? 1 : 0;
            }
        }

        function step() {
            const next = new Uint8Array(cols * rows);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let n = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            n += grid[((r + dr + rows) % rows) * cols + ((c + dc + cols) % cols)];
                        }
                    }
                    const alive = grid[r * cols + c];
                    next[r * cols + c] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
                }
            }
            grid = next;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(139, 92, 246, 0.18)';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r * cols + c]) {
                        ctx.fillRect(c * CELL, r * CELL, CELL - 1, CELL - 1);
                    }
                }
            }
        }

        // Respect reduced-motion: show static snapshot, skip animation
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        let lastTime = 0;
        function loop(ts) {
            requestAnimationFrame(loop);
            if (ts - lastTime < 1000 / FPS) return;
            lastTime = ts;
            step();
            draw();
        }

        window.addEventListener('resize', () => { init(); draw(); });
        init();
        if (reduced) { draw(); } else { requestAnimationFrame(loop); }
    })();
    </script>
